name: Spec Sync (Platform API changes)

on:
  repository_dispatch:
    types: [spec-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  # Single rolling group: serialize every dispatch onto the one rolling branch.
  # Same-spec no-op is enforced by the diff step below, not by the concurrency key.
  group: spec-sync
  cancel-in-progress: false

jobs:
  detect:
    name: Detect spec changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest spec
        run: |
          SPEC_URL="${{ github.event.client_payload.spec_url }}"
          if [ -z "$SPEC_URL" ]; then
            echo "::error::No spec_url in client_payload"
            exit 1
          fi

          if ! printf '%s' "$SPEC_URL" | grep -Eq '^https://'; then
            echo "::error::spec_url must be an HTTPS URL"
            exit 1
          fi

          curl --fail --show-error --location --proto '=https' --tlsv1.2 --retry 3 --retry-delay 2 "$SPEC_URL" -o openapi-new.json

      - name: Validate downloaded spec
        run: |
          jq -e 'type == "object" and (.openapi | type == "string") and (.paths | type == "object")' openapi-new.json >/dev/null

      - name: Compare with committed spec
        id: diff
        run: |
          if ! diff -q openapi.json openapi-new.json >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Spec changed — will regenerate types"

            # Section-level diagnostics
            OLD_PATHS=$(jq -r '(.paths // {}) | keys | length' openapi.json)
            NEW_PATHS=$(jq -r '(.paths // {}) | keys | length' openapi-new.json)
            OLD_SCHEMAS=$(jq -r '(.components.schemas // {}) | keys | length' openapi.json)
            NEW_SCHEMAS=$(jq -r '(.components.schemas // {}) | keys | length' openapi-new.json)
            echo "Paths: $OLD_PATHS -> $NEW_PATHS"
            echo "Schemas: $OLD_SCHEMAS -> $NEW_SCHEMAS"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Spec unchanged — nothing to do"
          fi

      - name: Update spec + regenerate types
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp openapi-new.json openapi.json
          npm run gen-types

      - name: Verify types compile
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm run typecheck
          npm run build
          npm test -- --reporter=dot

      - name: Open or update rolling sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPEC_SHA="${{ github.event.client_payload.spec_sha }}"
          SHORT_SHA="${SPEC_SHA:0:8}"
          if [ -z "$SHORT_SHA" ]; then
            SHORT_SHA="${GITHUB_RUN_ID}"
          fi
          # Fixed branch — one rolling PR, force-pushed each run. No SHA suffix.
          BRANCH="chore/sync-api-types"

          PLATFORM_REPO="${{ github.event.client_payload.platform_repo }}"
          if [ -z "$PLATFORM_REPO" ]; then
            PLATFORM_REPO="amigo-ai/amigo-platform"
          fi
          PLATFORM_COMMIT_URL="https://github.com/${PLATFORM_REPO}/commit/${SPEC_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # -B resets the branch to current HEAD (main from the checkout step), so the
          # rolling commit is always exactly one commit on top of main with no leftover
          # state from a prior open PR.
          git checkout -B "$BRANCH"
          git add openapi.json src/generated/api.ts
          git commit -m "chore: sync API types from platform spec (${SHORT_SHA})"
          git push --force-with-lease origin "$BRANCH"

          PR_TITLE="chore: sync API types from platform (${SHORT_SHA})"
          PR_BODY="$(cat <<EOF
          ## Summary
          - Auto-synced from platform repo spec change ([\`${SHORT_SHA}\`](${PLATFORM_COMMIT_URL}))
          - Regenerated \`src/generated/api.ts\` from latest \`openapi.json\`
          - Typecheck + build + tests verified

          ## Test plan
          - [x] CI passes (typecheck + build + tests)
          - [ ] Review generated type diffs for breaking changes

          After this PR is merged, \`spec-auto-release.yml\` waits for the Test workflow on \`main\` to pass, then dispatches a minor SDK release automatically.

          > This PR is force-updated in place by spec-sync each time the platform spec changes. The branch (\`${BRANCH}\`) tracks only the latest spec — older syncs are superseded, not stacked.

          Generated automatically by spec-sync workflow
          EOF
          )"

          EXISTING_PR=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          else
            echo "Creating new PR for branch ${BRANCH}"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          fi
