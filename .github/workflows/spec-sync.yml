name: Spec Sync (Platform API changes)

on:
  repository_dispatch:
    types: [spec-updated]

permissions:
  # `contents: write` is required for the `git push --force-with-lease` of
  # the rolling sync branch; `pull-requests: write` for the `gh pr create`
  # / `gh pr edit` calls below.
  contents: write
  pull-requests: write

concurrency:
  # Single rolling group: serialize every dispatch onto the one rolling branch.
  # Same-spec no-op is enforced by the diff step below, not by the concurrency key.
  group: spec-sync
  cancel-in-progress: false

jobs:
  detect:
    name: Detect spec changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download latest spec
        run: |
          SPEC_URL="${{ github.event.client_payload.spec_url }}"
          if [ -z "$SPEC_URL" ]; then
            echo "::error::No spec_url in client_payload"
            exit 1
          fi

          if ! printf '%s' "$SPEC_URL" | grep -Eq '^https://'; then
            echo "::error::spec_url must be an HTTPS URL"
            exit 1
          fi

          curl --fail --show-error --location --proto '=https' --tlsv1.2 --retry 3 --retry-delay 2 "$SPEC_URL" -o openapi-new.json

      - name: Validate downloaded spec
        run: |
          jq -e 'type == "object" and (.openapi | type == "string") and (.paths | type == "object")' openapi-new.json >/dev/null

      - name: Compare with committed spec
        id: diff
        run: |
          if ! diff -q openapi.json openapi-new.json >/dev/null 2>&1; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Spec changed — will regenerate types"

            # Section-level diagnostics
            OLD_PATHS=$(jq -r '(.paths // {}) | keys | length' openapi.json)
            NEW_PATHS=$(jq -r '(.paths // {}) | keys | length' openapi-new.json)
            OLD_SCHEMAS=$(jq -r '(.components.schemas // {}) | keys | length' openapi.json)
            NEW_SCHEMAS=$(jq -r '(.components.schemas // {}) | keys | length' openapi-new.json)
            echo "Paths: $OLD_PATHS -> $NEW_PATHS"
            echo "Schemas: $OLD_SCHEMAS -> $NEW_SCHEMAS"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Spec unchanged — nothing to do"
          fi

      - name: Update spec + regenerate types
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp openapi-new.json openapi.json
          npm run gen-types

      - name: Verify types compile
        if: steps.diff.outputs.changed == 'true'
        run: |
          npm run typecheck
          npm run build
          npm test -- --reporter=dot

      - name: Open or update rolling sync PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPEC_SHA="${{ github.event.client_payload.spec_sha }}"
          # Reject anything that isn't a 7–40 char hex string before it lands
          # in commit messages, PR titles, or branch metadata.
          if [ -n "$SPEC_SHA" ] && ! printf '%s' "$SPEC_SHA" | grep -Eq '^[0-9a-f]{7,40}$'; then
            echo "::error::Invalid spec_sha payload: ${SPEC_SHA}"
            exit 1
          fi
          SHORT_SHA="${SPEC_SHA:0:8}"
          if [ -z "$SHORT_SHA" ]; then
            SHORT_SHA="${GITHUB_RUN_ID}"
          fi
          # Fixed branch — one rolling PR, force-pushed each run. No SHA suffix.
          BRANCH="chore/sync-api-types"

          PLATFORM_REPO="${{ github.event.client_payload.platform_repo }}"
          if [ -z "$PLATFORM_REPO" ]; then
            PLATFORM_REPO="amigo-ai/amigo-platform"
          fi
          # Sanitize: strip newlines/CR and reject characters not valid in a
          # GitHub `owner/repo` slug so a malformed dispatch payload can't
          # break the heredoc below or inject markdown into the PR body.
          PLATFORM_REPO="${PLATFORM_REPO//[$'\n\r']/}"
          if ! printf '%s' "$PLATFORM_REPO" | grep -Eq '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$'; then
            echo "::warning::Invalid platform_repo payload (${PLATFORM_REPO}); falling back to default."
            PLATFORM_REPO="amigo-ai/amigo-platform"
          fi
          # Fall back to SHORT_SHA (which already collapses to GITHUB_RUN_ID
          # if SPEC_SHA was empty) so the link is never .../commit/ with an
          # empty SHA.
          COMMIT_REF="${SPEC_SHA:-$SHORT_SHA}"
          PLATFORM_COMMIT_URL="https://github.com/${PLATFORM_REPO}/commit/${COMMIT_REF}"

          # Pre-flight: if a reviewer intentionally closed the rolling PR
          # (e.g. mid-incident freeze) and didn't merge it, skip the sync
          # entirely — don't even force-push. Query notes:
          #   - `--limit 100` so a closed-but-unmerged PR doesn't fall off
          #     the default 30-result window after a stretch of normal
          #     merges.
          #   - `mergedAt == null` filter so a normal merge (the common
          #     close path) doesn't trip the pause sentinel.
          #   - `headRefName` exact match so a PR cut from a similarly
          #     named branch can't trip it either.
          # Capture author + number for the open PR so we can verify the
          # rolling PR is bot-owned before editing it (a collaborator-opened
          # PR on this same branch would otherwise be silently hijacked).
          EXISTING_PR_JSON=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --limit 100 \
            --json number,headRefName,author \
            --jq '[.[] | select(.headRefName == "'"$BRANCH"'")] | .[0] // empty')
          EXISTING_PR=$(printf '%s' "$EXISTING_PR_JSON" | jq -r '.number // empty')
          EXISTING_PR_AUTHOR=$(printf '%s' "$EXISTING_PR_JSON" | jq -r '.author.login // empty')
          CLOSED_UNMERGED_PR=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state closed \
            --limit 100 \
            --json number,closedAt,mergedAt,headRefName \
            --jq '[.[] | select(.mergedAt == null and .headRefName == "'"$BRANCH"'")] | sort_by(.closedAt) | reverse | .[0].number // empty')
          if [ -z "$EXISTING_PR" ] && [ -n "$CLOSED_UNMERGED_PR" ]; then
            # Surface as an error so the CI dashboard shows the pause
            # instead of burying it in a warning. The job still ends in a
            # known state (no orphaned branch update) — fail-fast over
            # silent fallback.
            echo "::error::Spec sync paused — PR #${CLOSED_UNMERGED_PR} on \`${BRANCH}\` is closed without merging. Reopen that PR to resume; this dispatch is a no-op."
            {
              echo "## Spec Sync — paused"
              echo ""
              echo "PR #${CLOSED_UNMERGED_PR} for branch \`${BRANCH}\` is closed (not merged), so this dispatch was skipped."
              echo "Reopen that PR to resume automatic syncing."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          # Refuse to silently overwrite a non-bot PR on the rolling branch.
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR_AUTHOR" != "github-actions[bot]" ]; then
            echo "::error::Existing PR #${EXISTING_PR} on \`${BRANCH}\` is owned by ${EXISTING_PR_AUTHOR}, not github-actions[bot]. Refusing to hijack — close or reassign it before resuming spec-sync."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Fetch the rolling branch (if it exists) so `--force-with-lease`
          # has a remote-tracking ref to compare against. Distinguish "ref
          # not found" (exit 128 — expected on first run) from any other
          # failure (auth, network, …) and hard-fail on the latter so the
          # lease isn't silently vacuous.
          set +e
          git fetch origin "$BRANCH"
          fetch_rc=$?
          set -e
          if [ "$fetch_rc" -ne 0 ] && [ "$fetch_rc" -ne 128 ]; then
            echo "::error::git fetch origin ${BRANCH} failed with exit ${fetch_rc} (auth/network); aborting to avoid a vacuous --force-with-lease."
            exit 1
          fi
          if [ "$fetch_rc" -eq 128 ]; then
            echo "::notice::Remote branch ${BRANCH} not found — first sync run; --force-with-lease will be vacuously satisfied this once."
          fi
          # -B resets the branch to current HEAD (main from the checkout step), so the
          # rolling commit is always exactly one commit on top of main with no leftover
          # state from a prior open PR.
          git checkout -B "$BRANCH"
          git add openapi.json src/generated/api.ts
          git commit -m "chore: sync API types from platform spec (${SHORT_SHA})"
          git push --force-with-lease origin "$BRANCH"

          PR_TITLE="chore: sync API types from platform (${SHORT_SHA})"
          PR_BODY="$(cat <<EOF
          ## Summary
          - Auto-synced from platform repo spec change ([\`${SHORT_SHA}\`](${PLATFORM_COMMIT_URL}))
          - Regenerated \`src/generated/api.ts\` from latest \`openapi.json\`
          - Typecheck + build + tests verified

          ## Test plan
          - [x] CI passes (typecheck + build + tests)
          - [ ] Review generated type diffs for breaking changes

          After this PR is merged, \`spec-auto-release.yml\` waits for the Test workflow on \`main\` to pass, then dispatches a minor SDK release automatically.

          > This PR is force-updated in place by spec-sync each time the platform spec changes. The branch (\`${BRANCH}\`) tracks only the latest spec — older syncs are superseded, not stacked.

          Generated automatically by spec-sync workflow
          EOF
          )"

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --title "$PR_TITLE" \
              --body "$PR_BODY"
          else
            echo "Creating new PR for branch ${BRANCH}"
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --base main \
              --head "$BRANCH"
          fi
