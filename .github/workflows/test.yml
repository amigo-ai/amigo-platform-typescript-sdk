name: Test

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
    inputs:
      skip_codecov:
        description: 'Skip Codecov upload'
        required: false
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Typecheck examples
        run: npm run typecheck:examples

      - name: Check generated API docs
        run: npm run docs:check

      - name: Build
        run: npm run build

      - name: Verify generated API types are committed
        run: |
          npm run gen-types
          git diff --exit-code -- src/generated/api.ts

      - name: Run unit tests (fast)
        if: ${{ inputs.skip_codecov || matrix.node-version != 22 }}
        run: npm test -- --reporter=dot

      - name: Run unit tests with coverage
        if: ${{ !inputs.skip_codecov && matrix.node-version == 22 }}
        run: npx vitest run --coverage --project unit --reporter=dot

      - name: Run dist tests
        run: npm run test:dist -- --reporter=dot

      - name: Run tarball smoke tests
        run: npm run test:tarball

      - name: Run reviewer orchestration tests
        run: npm run test:reviewer

      - name: Upload coverage to Codecov
        if: ${{ !inputs.skip_codecov && matrix.node-version == 22 }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests
        env:
          AMIGO_TEST_API_KEY: ${{ secrets.AMIGO_TEST_API_KEY }}
          AMIGO_TEST_WORKSPACE_ID: ${{ secrets.AMIGO_TEST_WORKSPACE_ID }}
          AMIGO_TEST_BASE_URL: ${{ secrets.AMIGO_TEST_BASE_URL }}
        run: npx vitest run tests/integration/ --reporter=dot
