name: PR Review (Claude on Vertex)

# Runs SDK-specific specialist review agents on every opened / updated PR and
# posts a consolidated review as a PR comment. Agents live in
# `.claude/agents/`; orchestration is `scripts/pr_review/`.
#
# Auth:
#   Uses GCP Vertex AI (AsyncAnthropicVertex). GCP auth comes from Workload
#   Identity Federation via google-github-actions/auth; the review WIF pool +
#   service account are provisioned in amigo-ai/platform-infra.
#
# Repo variables:
#   vars.GCP_WIF_PROVIDER           full provider resource name (required)
#   vars.GCP_REVIEW_SA              SA email with Vertex access (required)
#   vars.VERTEX_PROJECT             GCP project (default: amigo-platform)
#   vars.VERTEX_REGION              Claude region on Vertex (default: global)
#   vars.REVIEW_MODEL               specialist model (default: claude-sonnet-4-6)
#   vars.REVIEW_ORCHESTRATOR_MODEL  consolidator (default: claude-opus-4-6)
#
# Disable per-PR by including "[skip review]" in the PR title. Drafts are
# skipped. The orchestrator replaces its prior comment on re-runs so PRs don't
# accumulate duplicate reviews.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.claude/agents/**'
      - 'openapi.json'
      - 'api.md'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: >-
      !contains(github.event.pull_request.title, '[skip review]') &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      VERTEX_PROJECT: ${{ vars.VERTEX_PROJECT || 'amigo-platform' }}
      VERTEX_REGION: ${{ vars.VERTEX_REGION || 'global' }}
      REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'claude-sonnet-4-6' }}
      REVIEW_ORCHESTRATOR_MODEL: ${{ vars.REVIEW_ORCHESTRATOR_MODEL || 'claude-opus-4-6' }}
    steps:
      - name: Guard — skip if WIF provider not configured
        id: guard
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_REVIEW_SA: ${{ vars.GCP_REVIEW_SA }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER" ] || [ -z "$GCP_REVIEW_SA" ]; then
            echo "::warning::GCP_WIF_PROVIDER or GCP_REVIEW_SA not set — skipping review. Provision the CI WIF pool + SA in platform-infra and set the repo variables to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Authenticate to GCP (WIF)
        id: auth
        if: steps.guard.outputs.skip == 'false'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        continue-on-error: true
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_REVIEW_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Report WIF trust mismatch
        if: steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'failure'
        run: |
          marker='<!-- pr-review-auth-status -->'
          matching_comment_ids() {
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --paginate \
              --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${1}\"))) | .id"
          }
          body=$(cat <<EOF
          ${marker}
          ⚠️ Claude review could not authenticate to GCP Vertex for \`${{ github.repository }}\`.

          The configured Workload Identity Federation provider rejected this repo's GitHub OIDC token. In practice this means the provider or service-account trust in \`platform-infra/pr-review\` still only allows other repositories or workflow refs.

          Expected trust inputs:
          - repository: \`${{ github.repository }}\`
          - workflow: \`${{ github.repository }}/.github/workflows/pr-review.yml\`

          The SDK PR checks remain valid; only the external review integration is unavailable until the GCP trust policy is expanded.
          EOF
          )

          comment_ids="$(matching_comment_ids "$marker")"
          latest_comment_id=""
          for comment_id in $comment_ids; do
            latest_comment_id="$comment_id"
          done

          if [ -n "$latest_comment_id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$latest_comment_id" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body "$body"
          fi

          for comment_id in $comment_ids; do
            if [ "$comment_id" != "$latest_comment_id" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" >/dev/null
            fi
          done

      - name: Clear stale WIF trust mismatch note
        if: steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'success'
        run: |
          marker='<!-- pr-review-auth-status -->'
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" \
            | while read -r comment_id; do
                [ -n "$comment_id" ] || continue
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" >/dev/null
              done

      - name: Install uv
        if: steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'success'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true

      - name: Run review
        if: steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'success'
        run: |
          uv run --python 3.12 --with 'anthropic[vertex]>=0.52.0' \
            python -m scripts.pr_review --pr "$PR_NUMBER" \
              --specialist-model "$REVIEW_MODEL" \
              --orchestrator-model "$REVIEW_ORCHESTRATOR_MODEL" \
              --vertex-project "$VERTEX_PROJECT" \
              --vertex-region "$VERTEX_REGION"

      - name: Clear stale failure note
        if: success() && steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'success'
        run: |
          marker='<!-- sdk-review-failure:v1 -->'
          gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${marker}\"))) | .id" \
            | while read -r comment_id; do
                [ -n "$comment_id" ] || continue
                gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" >/dev/null
              done

      - name: Fallback comment on failure
        if: failure() && steps.guard.outputs.skip == 'false' && steps.auth.outcome == 'success'
        run: |
          marker='<!-- sdk-review-failure:v1 -->'
          matching_comment_ids() {
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --paginate \
              --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"${1}\"))) | .id"
          }
          body=$(cat <<EOF
          ${marker}
          ⚠️ Claude code review failed before it could post a structured report.

          See [action logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for the underlying failure. A human reviewer should cover type safety, API contract changes, test coverage, and breaking changes before merge.
          EOF
          )

          comment_ids="$(matching_comment_ids "$marker")"
          latest_comment_id=""
          for comment_id in $comment_ids; do
            latest_comment_id="$comment_id"
          done

          if [ -n "$latest_comment_id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$latest_comment_id" -f body="$body" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body "$body"
          fi

          for comment_id in $comment_ids; do
            if [ "$comment_id" != "$latest_comment_id" ]; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" >/dev/null
            fi
          done
