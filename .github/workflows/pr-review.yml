name: PR Review (Claude on Vertex)

# Runs SDK-specific specialist review agents on every opened / updated PR and
# posts a consolidated review as a PR comment. Agents live in
# `.claude/agents/`; orchestration is `scripts/pr_review/`.
#
# Auth:
#   Uses GCP Vertex AI (AsyncAnthropicVertex). GCP auth comes from Workload
#   Identity Federation via google-github-actions/auth; the review WIF pool +
#   service account are provisioned in amigo-ai/platform-infra.
#
# Repo variables:
#   vars.GCP_WIF_PROVIDER           full provider resource name (required)
#   vars.GCP_REVIEW_SA              SA email with Vertex access (required)
#   vars.VERTEX_PROJECT             GCP project (default: amigo-platform)
#   vars.VERTEX_REGION              Claude region on Vertex (default: global)
#   vars.REVIEW_MODEL               specialist model (default: claude-sonnet-4-6)
#   vars.REVIEW_ORCHESTRATOR_MODEL  consolidator (default: claude-opus-4-6)
#
# Disable per-PR by including "[skip review]" in the PR title. Drafts are
# skipped. The orchestrator replaces its prior comment on re-runs so PRs don't
# accumulate duplicate reviews.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.claude/agents/**'
      - 'openapi.json'
      - 'api.md'
      - 'README.md'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: >-
      !contains(github.event.pull_request.title, '[skip review]') &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      VERTEX_PROJECT: ${{ vars.VERTEX_PROJECT || 'amigo-platform' }}
      VERTEX_REGION: ${{ vars.VERTEX_REGION || 'global' }}
      REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'claude-sonnet-4-6' }}
      REVIEW_ORCHESTRATOR_MODEL: ${{ vars.REVIEW_ORCHESTRATOR_MODEL || 'claude-opus-4-6' }}
    steps:
      - name: Guard — skip if WIF provider not configured
        id: guard
        env:
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_REVIEW_SA: ${{ vars.GCP_REVIEW_SA }}
        run: |
          if [ -z "$GCP_WIF_PROVIDER" ] || [ -z "$GCP_REVIEW_SA" ]; then
            echo "::warning::GCP_WIF_PROVIDER or GCP_REVIEW_SA not set — skipping review. Provision the CI WIF pool + SA in platform-infra and set the repo variables to enable."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Authenticate to GCP (WIF)
        if: steps.guard.outputs.skip == 'false'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_REVIEW_SA }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Install uv
        if: steps.guard.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run review
        if: steps.guard.outputs.skip == 'false'
        run: |
          uv run --python 3.12 --with 'anthropic[vertex]>=0.52.0' \
            python -m scripts.pr_review --pr "$PR_NUMBER" \
              --specialist-model "$REVIEW_MODEL" \
              --orchestrator-model "$REVIEW_ORCHESTRATOR_MODEL" \
              --vertex-project "$VERTEX_PROJECT" \
              --vertex-region "$VERTEX_REGION"

      - name: Fallback comment on failure
        if: failure() && steps.guard.outputs.skip == 'false'
        run: |
          gh pr comment "$PR_NUMBER" --body "⚠️ Automated Claude (Vertex) SDK review failed to run. A human reviewer should review this PR before merge. See action logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
