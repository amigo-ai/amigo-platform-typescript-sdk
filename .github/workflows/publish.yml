name: Publish

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: 'Expected package version without the leading v'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          EXPECTED_VERSION: ${{ inputs.expected_version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
          else
            echo "::error::Publish must run from a release event or a v* tag ref."
            exit 1
          fi

          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Publish tag must match v<major>.<minor>.<patch>. Found: ${TAG}"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [ -n "$EXPECTED_VERSION" ] && [ "$EXPECTED_VERSION" != "$VERSION" ]; then
            echo "::error::Expected version ${EXPECTED_VERSION}, but tag ${TAG} resolves to ${VERSION}."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11
        run: npm install --global npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Validate publish credentials
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::add-mask::$NODE_AUTH_TOKEN"
          NODE_AUTH_TOKEN_TRIMMED="${NODE_AUTH_TOKEN//[[:space:]]/}"
          if [ -n "$NODE_AUTH_TOKEN_TRIMMED" ]; then
            echo "::add-mask::$NODE_AUTH_TOKEN_TRIMMED"
            NPM_USERCONFIG="$RUNNER_TEMP/npmrc-validate"
            trap 'rm -f "$NPM_USERCONFIG"' EXIT
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN_TRIMMED}" > "$NPM_USERCONFIG"
            chmod 600 "$NPM_USERCONFIG"
            npm whoami --userconfig "$NPM_USERCONFIG" --registry https://registry.npmjs.org >/dev/null
            echo "Using validated NPM_TOKEN fallback credentials."
            exit 0
          fi

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "::error::No NPM_TOKEN is configured and GitHub OIDC token request variables are unavailable. Configure npm trusted publishing for .github/workflows/publish.yml or provide NPM_TOKEN."
            exit 1
          fi

          echo "No NPM_TOKEN configured; publish will use npm trusted publishing via GitHub OIDC."

      - name: Validate release package
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$VERSION" ]; then
            echo "::error::package.json version ${PACKAGE_VERSION} does not match release tag v${VERSION}."
            exit 1
          fi

          VIEW_LOG=$(mktemp)
          trap 'rm -f "$VIEW_LOG"' EXIT
          VIEW_FOUND=false
          for attempt in 1 2; do
            : > "$VIEW_LOG"
            if npm view "@amigo-ai/platform-sdk@${VERSION}" version --json >"$VIEW_LOG" 2>&1; then
              VIEW_FOUND=true
              break
            fi
            if grep -Eq 'E404|"code"[[:space:]]*:[[:space:]]*"E404"|404 Not Found' "$VIEW_LOG"; then
              break
            fi
            echo "npm view failed for @amigo-ai/platform-sdk@${VERSION}; retrying once."
            sleep 10
          done

          if [ "$VIEW_FOUND" = "true" ]; then
            echo "::error::@amigo-ai/platform-sdk@${VERSION} is already published on npm."
            exit 1
          fi

          if grep -Eq 'E404|"code"[[:space:]]*:[[:space:]]*"E404"|404 Not Found' "$VIEW_LOG"; then
            echo "@amigo-ai/platform-sdk@${VERSION} is not published yet."
          else
            echo "::error::Unable to verify npm publication state for @amigo-ai/platform-sdk@${VERSION}."
            cat "$VIEW_LOG"
            {
              echo "## npm publication check failed"
              echo ""
              echo "Could not verify whether @amigo-ai/platform-sdk@${VERSION} already exists. Publish was stopped to avoid an unsafe duplicate attempt."
              echo "Re-run this workflow after the npm registry recovers; this guard runs before publishing and does not change npm state."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Verify package
        run: npm run prepublishOnly

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "::add-mask::$NODE_AUTH_TOKEN"
          NODE_AUTH_TOKEN_TRIMMED="${NODE_AUTH_TOKEN//[[:space:]]/}"
          if [ -n "$NODE_AUTH_TOKEN_TRIMMED" ]; then
            echo "::add-mask::$NODE_AUTH_TOKEN_TRIMMED"
            echo "Using NPM_TOKEN fallback. Prefer npm trusted publishing once package settings are configured."
            NPM_USERCONFIG="$RUNNER_TEMP/npmrc"
            trap 'rm -f "$NPM_USERCONFIG"' EXIT
            echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN_TRIMMED}" > "$NPM_USERCONFIG"
            chmod 600 "$NPM_USERCONFIG"
            npm publish --userconfig "$NPM_USERCONFIG" --access public --provenance
          else
            echo "Using npm trusted publishing via OIDC."
            npm publish --access public --provenance
          fi

      - name: Publish Summary
        run: |
          echo "## Publish Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: @amigo-ai/platform-sdk@${{ steps.release.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ steps.release.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provenance: requested" >> "$GITHUB_STEP_SUMMARY"
