name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (skip publish, commits, tags)'
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify latest Test workflow succeeded on this commit
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          CONCLUSION=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/test.yml/runs?head_sha=${HEAD_SHA}&status=completed&per_page=1" --jq '.workflow_runs[0].conclusion // ""')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::The latest Test workflow for ${HEAD_SHA} must succeed before release. Found: ${CONCLUSION:-none}"
            exit 1
          fi

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Regenerate types from committed spec
        run: |
          echo "Regenerating types from openapi.json..."
          npm run gen-types
          echo "Types regenerated"

      - name: Check generated API docs
        run: npm run docs:check

      - name: Increment version
        id: new_version
        run: |
          echo "Incrementing ${{ inputs.version_type }} version..."
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            NEW_VERSION=$(npm version ${{ inputs.version_type }} --no-git-tag-version --dry-run)
            NEW_VERSION=${NEW_VERSION#v}
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "(dry-run) Version would be: ${{ steps.current_version.outputs.version }} -> $NEW_VERSION"
          else
            npm version ${{ inputs.version_type }} --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "Version updated: ${{ steps.current_version.outputs.version }} -> $NEW_VERSION"
          fi

      - name: Build package
        run: |
          rm -rf dist/
          npm run build
          ls -la dist/

      - name: Pack tarball
        id: pack
        run: |
          FILE=$(npm pack --silent)
          echo "file=$FILE" >> $GITHUB_OUTPUT
          echo "Tarball created: $FILE"
          ls -la "$FILE"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          FILE="${{ steps.pack.outputs.file }}"
          npm publish "$FILE" --provenance --access public

      - name: Update CHANGELOG.md
        if: ${{ !inputs.dry_run }}
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          ENTRY=$(node scripts/release-history.mjs changelog --version "$NEW_VERSION")
          if [ -f CHANGELOG.md ]; then
            { head -1 CHANGELOG.md; echo ""; echo "$ENTRY"; tail -n +2 CHANGELOG.md; } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            { echo "# Changelog"; echo ""; echo "$ENTRY"; } > CHANGELOG.md
          fi

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        run: |
          git add package.json package-lock.json CHANGELOG.md || true
          git commit -m "v${{ steps.new_version.outputs.version }}"
          git push origin HEAD

      - name: Build release notes
        if: ${{ !inputs.dry_run }}
        run: |
          node scripts/release-history.mjs release-notes \
            --version "${{ steps.new_version.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            > release-notes.md

      - name: Create and push tag
        if: ${{ !inputs.dry_run }}
        run: |
          git tag -a "v${{ steps.new_version.outputs.version }}" -m "Release v${{ steps.new_version.outputs.version }}"
          git push origin "v${{ steps.new_version.outputs.version }}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: 'v${{ steps.new_version.outputs.version }}'
          name: 'Release v${{ steps.new_version.outputs.version }}'
          body_path: release-notes.md
          draft: false
          files: |
            ${{ steps.pack.outputs.file }}

      - name: Cleanup temp files
        if: always()
        run: rm -f release-notes.md || true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ steps.new_version.outputs.version }}
          path: |
            dist/
            ${{ steps.pack.outputs.file }}
          retention-days: 30

      - name: Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.new_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Previous: ${{ steps.current_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry Run: ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
          echo "- Published: ${{ inputs.dry_run && 'skipped' || 'npm' }}" >> $GITHUB_STEP_SUMMARY
