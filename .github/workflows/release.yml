name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run (prepare local version/changelog/package only; skip commits, tags, releases, and publish dispatch)'
        required: false
        default: false
        type: boolean

# Release operators:
# - Prefer npm trusted publishing for the Publish workflow. Configure the
#   package on npm with this repository and `publish.yml` as the trusted
#   publisher, then remove long-lived npm automation tokens.
# - Configure `RELEASE_PUSH_TOKEN` only when the target branch is protected and
#   the default `GITHUB_TOKEN` cannot push the version commit and tag.

permissions:
  actions: read
  contents: write
  issues: write # release recovery and visibility-mismatch issues

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Prepare tag and GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      new_version: ${{ steps.new_version.outputs.version }}
      release_tag: ${{ steps.new_version.outputs.tag }}

    steps:
      - name: Validate release target
        run: |
          if [ "${{ github.ref_type }}" != "branch" ]; then
            echo "::error::Release workflow must be dispatched from a branch ref. Found ref_type=${{ github.ref_type }}."
            exit 1
          fi

      - name: Validate finalize push credentials
        if: ${{ !inputs.dry_run }}
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          echo "::add-mask::$RELEASE_PUSH_TOKEN"
          # This catches common missing-token and repo-level permission cases
          # before any release metadata is created. Ruleset-only restrictions
          # may still require RELEASE_PUSH_TOKEN even when .protected is false.
          BRANCH_PROTECTED=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${BRANCH_NAME}" --jq '.protected')
          RELEASE_PUSH_TOKEN_TRIMMED="${RELEASE_PUSH_TOKEN//[[:space:]]/}"

          if [ "$BRANCH_PROTECTED" = "true" ] && [ -z "$RELEASE_PUSH_TOKEN_TRIMMED" ]; then
            echo "::error::Branch ${BRANCH_NAME} is protected. Configure RELEASE_PUSH_TOKEN with push access that can create the version commit and tag."
            exit 1
          fi

          if [ -n "$RELEASE_PUSH_TOKEN_TRIMMED" ]; then
            CAN_PUSH=$(GH_TOKEN="$RELEASE_PUSH_TOKEN_TRIMMED" gh api "repos/${GITHUB_REPOSITORY}" --jq '.permissions.push // false')
            if [ "$CAN_PUSH" != "true" ]; then
              echo "::error::RELEASE_PUSH_TOKEN lacks repository-level push permission for ${GITHUB_REPOSITORY}."
              exit 1
            fi
          fi

      - name: Resolve push credentials
        id: push_credentials
        env:
          RELEASE_PUSH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          echo "::add-mask::$RELEASE_PUSH_TOKEN"
          RELEASE_PUSH_TOKEN_TRIMMED="${RELEASE_PUSH_TOKEN//[[:space:]]/}"
          if [ -n "$RELEASE_PUSH_TOKEN_TRIMMED" ]; then
            echo "::add-mask::$RELEASE_PUSH_TOKEN_TRIMMED"
            echo "has_release_push_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_release_push_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code with release push token
        if: steps.push_credentials.outputs.has_release_push_token == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          # Full history/tags let the publish handoff verify the release tag SHA.
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PUSH_TOKEN }}

      - name: Checkout code with GitHub token
        if: steps.push_credentials.outputs.has_release_push_token != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          # Full history/tags let the publish handoff verify the release tag SHA.
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm 11
        run: npm install --global npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Verify latest Test workflow succeeded on this commit
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          CONCLUSION=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" --jq ".workflow_runs | map(select(.head_sha == \"${HEAD_SHA}\" and .path == \".github/workflows/test.yml\" and .event == \"push\" and .status == \"completed\")) | sort_by(.created_at) | reverse | .[0].conclusion // \"\"")
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::The latest Test workflow for ${HEAD_SHA} must succeed before release. Found: ${CONCLUSION:-none}"
            exit 1
          fi

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      - name: Compute target version
        id: new_version
        run: |
          NEW_VERSION=$(node -e 'const [version, type] = process.argv.slice(1); const parts = version.split(".").map(Number); if (parts.length !== 3 || parts.some(Number.isNaN)) throw new Error(`Invalid semver: ${version}`); const [major, minor, patch] = parts; const next = { patch: [major, minor, patch + 1], minor: [major, minor + 1, 0], major: [major + 1, 0, 0] }[type]; if (!next) throw new Error(`Unsupported version type: ${type}`); console.log(next.join("."));' "${{ steps.current_version.outputs.version }}" "${{ inputs.version_type }}")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $NEW_VERSION"

      - name: Ensure target version is available
        env:
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
          RELEASE_TAG: ${{ steps.new_version.outputs.tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Local tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Remote tag ${RELEASE_TAG} already exists."
            exit 1
          fi

          VIEW_LOG=$(mktemp)
          trap 'rm -f "$VIEW_LOG"' EXIT
          VIEW_FOUND=false
          for attempt in 1 2; do
            : > "$VIEW_LOG"
            if npm view "@amigo-ai/platform-sdk@${NEW_VERSION}" version --json >"$VIEW_LOG" 2>&1; then
              VIEW_FOUND=true
              break
            fi
            if grep -Eq 'E404|"code"[[:space:]]*:[[:space:]]*"E404"|404 Not Found' "$VIEW_LOG"; then
              break
            fi
            echo "npm view failed for @amigo-ai/platform-sdk@${NEW_VERSION}; retrying once."
            sleep 10
          done

          if [ "$VIEW_FOUND" = "true" ]; then
            echo "::error::@amigo-ai/platform-sdk@${NEW_VERSION} already exists on npm."
            exit 1
          fi

          if grep -Eq 'E404|"code"[[:space:]]*:[[:space:]]*"E404"|404 Not Found' "$VIEW_LOG"; then
            echo "@amigo-ai/platform-sdk@${NEW_VERSION} is not published yet."
          else
            echo "::error::Unable to verify npm publication state for @amigo-ai/platform-sdk@${NEW_VERSION}."
            cat "$VIEW_LOG"
            {
              echo "## npm publication check failed"
              echo ""
              echo "Could not verify whether @amigo-ai/platform-sdk@${NEW_VERSION} already exists. Release was stopped before creating git metadata."
              echo "Re-run this workflow after the npm registry recovers; this guard runs before release metadata is created."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Regenerate types from committed spec
        run: npm run gen-types

      - name: Verify generated types are committed
        run: |
          if ! git diff --quiet -- src/generated/api.ts; then
            echo "::error::src/generated/api.ts changed after regenerating from openapi.json. Commit the generated type update before releasing."
            git diff -- src/generated/api.ts
            exit 1
          fi

      - name: Increment version in workspace
        # Dry runs intentionally mutate only the ephemeral runner workspace so
        # the package, tarball, and release notes are validated at the exact
        # target version without pushing release metadata.
        run: |
          npm version "${{ steps.new_version.outputs.version }}" --no-git-tag-version
          echo "Prepared version: ${{ steps.current_version.outputs.version }} -> ${{ steps.new_version.outputs.version }}"

      - name: Update CHANGELOG.md
        # See the dry-run note above: this is local-only unless the later
        # non-dry-run commit step persists the generated metadata.
        run: |
          NEW_VERSION="${{ steps.new_version.outputs.version }}"
          ENTRY=$(node scripts/release-history.mjs changelog --version "$NEW_VERSION")
          if [ -f CHANGELOG.md ]; then
            { head -1 CHANGELOG.md; echo ""; echo "$ENTRY"; tail -n +2 CHANGELOG.md; } > CHANGELOG.tmp
            mv CHANGELOG.tmp CHANGELOG.md
          else
            { echo "# Changelog"; echo ""; echo "$ENTRY"; } > CHANGELOG.md
          fi

      - name: Verify package
        run: npm run prepublishOnly

      - name: Pack tarball
        id: pack
        run: |
          FILE=$(npm pack --silent)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Tarball created: $FILE"
          ls -la "$FILE"

      - name: Build release notes
        run: |
          node scripts/release-history.mjs release-notes \
            --version "${{ steps.new_version.outputs.version }}" \
            --repo "${GITHUB_REPOSITORY}" \
            > release-notes.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: release-${{ steps.new_version.outputs.version }}
          path: |
            dist/
            release-notes.md
            ${{ steps.pack.outputs.file }}
          retention-days: 30

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Confirm branch has not moved
        if: ${{ !inputs.dry_run }}
        run: |
          git fetch origin "${{ github.ref_name }}"
          CURRENT_HEAD=$(git rev-parse "origin/${{ github.ref_name }}")
          if [ "$CURRENT_HEAD" != "$GITHUB_SHA" ]; then
            echo "::error::Branch ${{ github.ref_name }} moved from ${GITHUB_SHA} to ${CURRENT_HEAD}. Re-run the release from the latest commit."
            exit 1
          fi

      - name: Commit and push release metadata
        if: ${{ !inputs.dry_run }}
        run: |
          git add package.json package-lock.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "::error::No release metadata changes were produced."
            exit 1
          fi

          git commit -m "v${{ steps.new_version.outputs.version }}"
          git tag -a "${{ steps.new_version.outputs.tag }}" -m "Release ${{ steps.new_version.outputs.tag }}"

          git push --atomic \
            "--force-with-lease=refs/heads/${{ github.ref_name }}:${GITHUB_SHA}" \
            origin \
            "HEAD:${{ github.ref_name }}" \
            "${{ steps.new_version.outputs.tag }}"

      - name: Verify release tag exists
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! git ls-remote --exit-code --tags origin "refs/tags/${{ steps.new_version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Expected release tag ${{ steps.new_version.outputs.tag }} does not exist on origin."
            exit 1
          fi

      - name: Create GitHub Release with release push token
        if: ${{ !inputs.dry_run && steps.push_credentials.outputs.has_release_push_token == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PUSH_TOKEN }}
        run: |
          echo "::add-mask::$GH_TOKEN"
          gh release create "${{ steps.new_version.outputs.tag }}" \
            "${{ steps.pack.outputs.file }}" \
            --title "Release ${{ steps.new_version.outputs.tag }}" \
            --notes-file release-notes.md

      - name: Create GitHub Release with GitHub token
        if: ${{ !inputs.dry_run && steps.push_credentials.outputs.has_release_push_token != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.new_version.outputs.tag }}" \
            "${{ steps.pack.outputs.file }}" \
            --title "Release ${{ steps.new_version.outputs.tag }}" \
            --notes-file release-notes.md

      - name: Verify publish workflow queued
        id: publish_run
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.new_version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          echo "recovery_required=false" >> "$GITHUB_OUTPUT"
          echo "publish_visible_without_run=false" >> "$GITHUB_OUTPUT"
          # Covers release timestamp propagation plus the full Actions visibility poll.
          PUBLISH_LOOKBACK_SECONDS=900

          if ! RELEASE_VISIBLE_AT=$(gh release view "$RELEASE_TAG" \
            --json createdAt,publishedAt \
            --jq '[.publishedAt, .createdAt] | map(select(. != null and . != "")) | .[0] // ""'); then
            echo "::warning::Could not read GitHub Release timestamps for ${RELEASE_TAG}; using the current time as the publish workflow lookup anchor."
            RELEASE_VISIBLE_AT=""
          fi
          RELEASE_TAG_SHA=$(git rev-list -n 1 "$RELEASE_TAG" 2>/dev/null || true)
          if [ -z "$RELEASE_TAG_SHA" ]; then
            echo "::warning::Could not resolve commit SHA for ${RELEASE_TAG}; publish run lookup will rely on the tag name only."
          fi

          if [ -z "$RELEASE_VISIBLE_AT" ]; then
            RELEASE_LOOKBACK_AT=$(node -e 'const lookbackMs = Number(process.argv[1]) * 1000; console.log(new Date(Date.now() - lookbackMs).toISOString().replace(/\.\d{3}Z$/, "Z"));' "$PUBLISH_LOOKBACK_SECONDS")
          else
            if ! RELEASE_LOOKBACK_AT=$(node -e 'const visibleAt = Date.parse(process.argv[1]); const lookbackMs = Number(process.argv[2]) * 1000; if (Number.isNaN(visibleAt)) { process.exit(1); } console.log(new Date(visibleAt - lookbackMs).toISOString().replace(/\.\d{3}Z$/, "Z"));' "$RELEASE_VISIBLE_AT" "$PUBLISH_LOOKBACK_SECONDS"); then
              echo "::error::GitHub Release ${RELEASE_TAG} returned malformed timestamp: ${RELEASE_VISIBLE_AT}"
              exit 1
            fi
          fi
          {
            echo "## Publish handoff lookup"
            echo ""
            echo "- Lookback starts at: ${RELEASE_LOOKBACK_AT}"
            echo "- Lookback seconds: ${PUBLISH_LOOKBACK_SECONDS}"
          } >> "$GITHUB_STEP_SUMMARY"

          # Release timestamp propagation and Actions run visibility can both lag
          # behind `gh release create`, so search farther back than the poll loop.
          for attempt in $(seq 1 30); do
            RUN_URL=$(gh run list \
              --workflow publish.yml \
              --limit 100 \
              --json event,createdAt,headBranch,headSha,url \
              | node -e 'const fs = require("node:fs"); const runs = JSON.parse(fs.readFileSync(0, "utf8")); const [tag, tagSha, lookbackAt] = process.argv.slice(1); const lookbackMs = Date.parse(lookbackAt); const run = runs.find((item) => item.event === "release" && Date.parse(item.createdAt) >= lookbackMs && (item.headBranch === tag || (tagSha && item.headSha === tagSha))); if (run?.url) console.log(run.url);' \
                "$RELEASE_TAG" "$RELEASE_TAG_SHA" "$RELEASE_LOOKBACK_AT")

            if [ -n "$RUN_URL" ]; then
              echo "url=$RUN_URL" >> "$GITHUB_OUTPUT"
              echo "Publish workflow queued: $RUN_URL"
              exit 0
            fi

            echo "Publish workflow for ${RELEASE_TAG} not visible yet (attempt ${attempt}/30)."
            sleep 10
          done

          # After the 5-minute publish-run poll, spend up to 90 seconds checking
          # npm so recovery can distinguish "not published" from
          # "published, but the release-triggered publish run was not found."
          NPM_VIEW_STDERR=$(mktemp)
          trap 'rm -f "$NPM_VIEW_STDERR"' EXIT
          for attempt in $(seq 1 6); do
            if npm view "@amigo-ai/platform-sdk@${RELEASE_VERSION}" version --json --registry https://registry.npmjs.org --no-update-notifier >/dev/null 2>"$NPM_VIEW_STDERR"; then
              echo "publish_visible_without_run=true" >> "$GITHUB_OUTPUT"
              echo "::warning title=Publish visibility mismatch::GitHub Release ${RELEASE_TAG} was created and @amigo-ai/platform-sdk@${RELEASE_VERSION} is already visible on npm, but publish.yml was not visible after publish-run polling and npm confirmation."
              {
                echo "## Publish workflow visibility warning"
                echo ""
                echo "GitHub Release ${RELEASE_TAG} was created and @amigo-ai/platform-sdk@${RELEASE_VERSION} is already visible on npm, but publish.yml was not visible after publish-run polling and npm confirmation. The release workflow is failing intentionally so the mismatch issue remains visible."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            NPM_VIEW_ERROR=$(cat "$NPM_VIEW_STDERR")
            if printf '%s\n' "$NPM_VIEW_ERROR" | grep -Eq 'E404|No match found|404 Not Found'; then
              echo "npm package @amigo-ai/platform-sdk@${RELEASE_VERSION} is not visible yet (attempt ${attempt}/6)."
            else
              echo "::warning title=npm view failed::npm view failed unexpectedly for @amigo-ai/platform-sdk@${RELEASE_VERSION} (attempt ${attempt}/6)."
              printf '%s\n' "$NPM_VIEW_ERROR"
            fi
            if [ "$attempt" != "6" ]; then
              sleep 15
            fi
          done

          # Keep this output immediately before the failing exit so recovery
          # notification stays wired to the missing-publish-run path.
          echo "recovery_required=true" >> "$GITHUB_OUTPUT"
          echo "::warning::GitHub Release ${RELEASE_TAG} was created, but publish.yml was not visible within 5 minutes."
          {
            echo "## Publish workflow visibility warning"
            echo ""
            echo "GitHub Release ${RELEASE_TAG} was created, but publish.yml was not visible within 5 minutes. This may be an Actions API propagation delay; check the Publish workflow before taking manual recovery steps."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Notify release recovery required
        # The outcome check covers mid-step failures before recovery_required can be written.
        if: ${{ failure() && !inputs.dry_run && steps.publish_run.outputs.publish_visible_without_run != 'true' && (steps.publish_run.outputs.recovery_required == 'true' || steps.publish_run.outcome == 'failure') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.new_version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.new_version.outputs.version }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::Release tag output is blank; inspect the failed workflow before retrying."
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "No pushed release tag detected; recovery notification is not needed."
            exit 0
          fi

          marker='<!-- release-recovery-required:v1 -->'
          title="Release recovery required for ${RELEASE_TAG}"
          body=$(cat <<EOF
          ${marker}
          A release workflow failed after tag \`${RELEASE_TAG}\` was pushed.

          Manual recovery is required before another release attempt:
          1. Inspect workflow run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}.
          2. Verify whether GitHub Release \`${RELEASE_TAG}\` exists.
          3. If the release is missing, create it from tag \`${RELEASE_TAG}\` with the intended release notes.
          4. Verify whether \`@amigo-ai/platform-sdk@${RELEASE_VERSION}\` published to npm.
          5. If npm publish did not run, dispatch \`publish.yml\` from tag \`${RELEASE_TAG}\` with \`expected_version=${RELEASE_VERSION}\`.

          Context:
          - branch: \`${BRANCH_NAME}\`
          - triggering sha: \`${GITHUB_SHA}\`
          - tag: \`${RELEASE_TAG}\`
          EOF
          )

          issue_numbers="$(gh api "repos/${GITHUB_REPOSITORY}/issues" \
            --paginate \
            --jq ".[] | select(.pull_request | not) | select(.user.login == \"github-actions[bot]\" and .state == \"open\" and (.body | contains(\"${marker}\"))) | .number")"
          latest_issue_number=$(printf '%s\n' "$issue_numbers" | awk 'NF' | sort -n | tail -n1)

          if [ -n "$latest_issue_number" ]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${latest_issue_number}" -f title="$title" -f body="$body" >/dev/null
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues" -f title="$title" -f body="$body" >/dev/null
          fi

          printf '%s\n' "$issue_numbers" | awk 'NF' | sort -n | while read -r issue_number; do
            if [ "$issue_number" != "$latest_issue_number" ]; then
              gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${issue_number}" -f state=closed >/dev/null
            fi
          done

      - name: Notify publish visibility mismatch
        if: ${{ failure() && !inputs.dry_run && steps.publish_run.outputs.publish_visible_without_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.new_version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          gh_api_retry() {
            for attempt in $(seq 1 3); do
              if gh api "$@"; then
                return 0
              fi
              if [ "$attempt" != "3" ]; then
                echo "GitHub API call failed; retrying (attempt ${attempt}/3)." >&2
                sleep 5
              fi
            done
            echo "::error title=Publish visibility mismatch notification failed::GitHub API call failed after 3 attempts. The release workflow remains failed; inspect the publish visibility mismatch summary in this run."
            return 1
          }

          marker='<!-- release-publish-visibility-mismatch:v1 -->'
          title="Publish visibility mismatch for ${RELEASE_TAG}"
          body=$(cat <<EOF
          ${marker}
          GitHub Release \`${RELEASE_TAG}\` exists and \`@amigo-ai/platform-sdk@${RELEASE_VERSION}\` is visible on npm, but release.yml could not find the matching release-triggered publish.yml run. The release workflow failed intentionally to keep this audit visible.

          Audit required:
          1. Verify that publish.yml has a release-event run for \`${RELEASE_TAG}\`.
          2. Confirm the npm package was published by the expected trusted publishing or automation credential.
          3. Close this issue after the publish run is verified or the mismatch is explained.

          Context:
          - tag: \`${RELEASE_TAG}\`
          - package: \`@amigo-ai/platform-sdk@${RELEASE_VERSION}\`
          - release workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          issue_numbers="$(gh_api_retry "repos/${GITHUB_REPOSITORY}/issues" \
            --paginate \
            --jq ".[] | select(.pull_request | not) | select(.user.login == \"github-actions[bot]\" and .state == \"open\" and (.body | contains(\"${marker}\"))) | .number")"
          latest_issue_number=$(printf '%s\n' "$issue_numbers" | awk 'NF' | sort -n | tail -n1)

          if [ -n "$latest_issue_number" ]; then
            gh_api_retry --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${latest_issue_number}" -f title="$title" -f body="$body" >/dev/null
          else
            gh_api_retry --method POST "repos/${GITHUB_REPOSITORY}/issues" -f title="$title" -f body="$body" >/dev/null
          fi

          printf '%s\n' "$issue_numbers" | awk 'NF' | sort -n | while read -r issue_number; do
            if [ "$issue_number" != "$latest_issue_number" ]; then
              gh_api_retry --method PATCH "repos/${GITHUB_REPOSITORY}/issues/${issue_number}" -f state=closed >/dev/null
            fi
          done

      - name: Publish handoff
        if: ${{ !inputs.dry_run }}
        run: echo "publish.yml will run once from the GitHub Release published event."

      - name: Release Summary
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version: ${{ steps.new_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Previous: ${{ steps.current_version.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dry Run: ${{ inputs.dry_run }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tarball: ${{ steps.pack.outputs.file }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish: ${{ inputs.dry_run && 'skipped' || 'publish.yml triggered by release event' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish run: ${{ steps.publish_run.outputs.url || '(not queued in this run)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Publish visible without run match: ${{ steps.publish_run.outputs.publish_visible_without_run || 'false' }}" >> "$GITHUB_STEP_SUMMARY"
