<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Amigo Text Chat</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      header {
        background: #1a1a2e;
        color: #fff;
        padding: 12px 20px;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      header .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #666;
        transition: background 0.3s;
      }

      header .dot.connected {
        background: #4caf50;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .msg {
        max-width: 72%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .msg.user {
        align-self: flex-end;
        background: #1a1a2e;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .msg.agent {
        align-self: flex-start;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-bottom-left-radius: 4px;
      }

      .msg.error {
        align-self: center;
        background: #fff3f3;
        border: 1px solid #e57373;
        color: #c62828;
        font-size: 13px;
      }

      .msg.system {
        align-self: center;
        color: #999;
        font-size: 12px;
        padding: 4px 0;
      }

      .typing {
        align-self: flex-start;
        display: none;
        gap: 4px;
        padding: 12px 16px;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 16px;
        border-bottom-left-radius: 4px;
      }

      .typing.visible {
        display: flex;
      }

      .typing span {
        width: 6px;
        height: 6px;
        background: #999;
        border-radius: 50%;
        animation: bounce 1.4s ease-in-out infinite;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        60%,
        100% {
          transform: translateY(0);
        }
        30% {
          transform: translateY(-6px);
        }
      }

      .tool-card {
        align-self: flex-start;
        max-width: 72%;
        background: #fff;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        overflow: hidden;
        font-size: 13px;
      }

      .tool-card .tool-header {
        padding: 8px 12px;
        background: #f8f9fa;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
      }

      .tool-card .tool-header .status-icon {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .tool-card .tool-header .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid #e0e0e0;
        border-top-color: #1a1a2e;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .tool-card .tool-body {
        padding: 8px 12px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 12px;
        color: #555;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .tool-card .tool-body.result {
        border-top: 1px solid #e0e0e0;
        background: #f8f9fa;
      }

      .tool-card.succeeded .tool-header {
        color: #2e7d32;
      }
      .tool-card.failed .tool-header {
        color: #c62828;
      }

      #input-area {
        padding: 12px 20px;
        background: #fff;
        border-top: 1px solid #e0e0e0;
        display: flex;
        gap: 10px;
      }

      #input-area textarea {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 20px;
        font-size: 14px;
        font-family: inherit;
        resize: none;
        outline: none;
        max-height: 120px;
        line-height: 1.4;
      }

      #input-area textarea:focus {
        border-color: #1a1a2e;
      }

      #input-area button {
        padding: 0 20px;
        background: #1a1a2e;
        color: #fff;
        border: none;
        border-radius: 20px;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
      }

      #input-area button:disabled {
        opacity: 0.4;
        cursor: default;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="dot" id="status-dot"></div>
      <span>Amigo Text Chat</span>
      <span id="session-info" style="margin-left: auto; font-size: 12px; color: #aaa"></span>
    </header>

    <div id="messages">
      <div class="typing" id="typing"><span></span><span></span><span></span></div>
    </div>

    <div id="input-area">
      <textarea id="input" rows="1" placeholder="Type a message..." disabled></textarea>
      <button id="send" disabled>Send</button>
    </div>

    <script>
      ;(function () {
        var messagesEl = document.getElementById('messages')
        var typingEl = document.getElementById('typing')
        var inputEl = document.getElementById('input')
        var sendBtn = document.getElementById('send')
        var statusDot = document.getElementById('status-dot')
        var sessionInfo = document.getElementById('session-info')

        var ws = null
        var ready = false
        var toolCards = {}

        function connect() {
          if (ws) {
            ws.onclose = null
            ws.onerror = null
            ws.onmessage = null
            try {
              ws.close()
            } catch (e) {}
          }

          ready = false
          inputEl.disabled = true
          sendBtn.disabled = true

          var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:'
          ws = new WebSocket(protocol + '//' + location.host + '/ws')

          ws.onopen = function () {
            statusDot.classList.add('connected')
          }

          ws.onmessage = function (event) {
            var frame = JSON.parse(event.data)

            switch (frame.type) {
              case 'connected':
                break

              case 'session_started':
                sessionInfo.textContent = 'Session: ' + frame.session_id.slice(0, 12) + '...'
                ready = true
                inputEl.disabled = false
                sendBtn.disabled = false
                inputEl.focus()
                break

              case 'typing':
                typingEl.classList.add('visible')
                messagesEl.scrollTop = messagesEl.scrollHeight
                break

              case 'tool_call_started':
                typingEl.classList.remove('visible')
                var card = document.createElement('div')
                card.className = 'tool-card'
                card.innerHTML =
                  '<div class="tool-header">' +
                  '<div class="status-icon"><div class="spinner"></div></div>' +
                  '<span>' + esc(frame.tool_name) + '</span>' +
                  '</div>' +
                  '<div class="tool-body">' + esc(pretty(frame.input)) + '</div>'
                messagesEl.insertBefore(card, typingEl)
                if (frame.call_id) toolCards[frame.call_id] = card
                messagesEl.scrollTop = messagesEl.scrollHeight
                break

              case 'tool_call_completed':
                typingEl.classList.remove('visible')
                var tc = frame.call_id && toolCards[frame.call_id]
                if (tc) {
                  tc.classList.add(frame.succeeded ? 'succeeded' : 'failed')
                  tc.querySelector('.status-icon').innerHTML = frame.succeeded ? '&#10003;' : '&#10007;'
                  var rb = document.createElement('div')
                  rb.className = 'tool-body result'
                  rb.textContent = (frame.result || '').slice(0, 500)
                  tc.appendChild(rb)
                  delete toolCards[frame.call_id]
                }
                messagesEl.scrollTop = messagesEl.scrollHeight
                break

              case 'message':
                typingEl.classList.remove('visible')
                addBubble('agent', frame.text)
                break

              case 'error':
                typingEl.classList.remove('visible')
                addBubble('error', frame.message)
                break

              case 'session_ended':
                typingEl.classList.remove('visible')
                ready = false
                inputEl.disabled = true
                sendBtn.disabled = true
                addBubble('system', 'Session ended — refresh to start a new chat')
                break
            }
          }

          ws.onclose = function () {
            statusDot.classList.remove('connected')
            ready = false
            inputEl.disabled = true
            sendBtn.disabled = true
          }

          ws.onerror = function () {}
        }

        function addBubble(cls, text) {
          var el = document.createElement('div')
          el.className = 'msg ' + cls
          el.textContent = text
          messagesEl.insertBefore(el, typingEl)
          messagesEl.scrollTop = messagesEl.scrollHeight
        }

        function send() {
          var text = inputEl.value.trim()
          if (!text || !ready || !ws || ws.readyState !== 1) return
          addBubble('user', text)
          ws.send(JSON.stringify({ type: 'message', text: text }))
          inputEl.value = ''
          inputEl.style.height = 'auto'
          inputEl.focus()
        }

        function esc(s) {
          var d = document.createElement('div')
          d.textContent = s
          return d.innerHTML
        }

        function pretty(obj) {
          try {
            return JSON.stringify(obj, null, 2)
          } catch (e) {
            return String(obj)
          }
        }

        sendBtn.onclick = send
        inputEl.onkeydown = function (e) {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault()
            send()
          }
        }
        inputEl.oninput = function () {
          this.style.height = 'auto'
          this.style.height = Math.min(this.scrollHeight, 120) + 'px'
        }

        connect()
      })()
    </script>
  </body>
</html>
